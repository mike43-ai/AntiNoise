name = "anti-noise-api"
main = "src/index.ts"
compatibility_date = "2025-01-09"
compatibility_flags = ["nodejs_compat"]

# Public-facing route (set after `wrangler deploy` succeeds first time):
# routes = [{ pattern = "api.antinoise.app/*", custom_domain = true }]

[vars]
# Public env (non-secret). Override per-environment below.
# Model is an OpenRouter model id — swap providers by changing this string only.
# Examples: "google/gemini-2.0-flash-001", "anthropic/claude-haiku-4-5",
# "openai/gpt-4o-mini". See https://openrouter.ai/models
OPENROUTER_MODEL = "google/gemini-2.0-flash-001"
# Attribution header sent to OpenRouter for the analytics dashboard.
OPENROUTER_REFERER = "https://antinoise.app"
FIREBASE_PROJECT_ID = "antinoise-6601f"
# Numeric GCP project number — App Check token issuer/audience (non-secret).
FIREBASE_PROJECT_NUMBER = "783988295054"
# App Check rollout: "false" = monitor (verify + log, never block). Flip to
# "true" only after logs confirm ~all traffic carries a valid App Check token,
# else older clients without a token get 401'd.
APP_CHECK_ENFORCE = "false"

# Free tier: 10 AI summaries / month per user
FREE_MONTHLY_LIMIT = "10"
# Pro tier: 200 calls / day per user (anti-abuse cap)
PRO_DAILY_LIMIT = "200"

# Secrets (set via `wrangler secret put <NAME>`):
#   OPENROUTER_API_KEY             — https://openrouter.ai/keys
#   FIREBASE_SERVICE_ACCOUNT_JSON  — raw JSON of a Firebase service account key
#                                    (Firebase Console → Settings → Service
#                                    accounts → Generate new private key)
#   REVENUECAT_WEBHOOK_AUTH        — the Authorization header value RC will
#                                    send (set in RC Dashboard → Integrations
#                                    → Webhooks → Add new)

# KV namespace for per-UID rate-limit counters.
# Create with: wrangler kv namespace create RATE_LIMIT
# Then paste the id below:
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "95db86315dac42bb8d5c7f2c22888ba3"

[observability]
enabled = true
