<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anti Noise — Quote card 1080x1080</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a2a2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .card {
    width: 1080px; height: 1080px;
    background: #1A1916;
    color: #F6F0EA;
    padding: 100px 90px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .card::before {
    content: '';
    position: absolute;
    bottom: -300px; left: -300px;
    width: 700px; height: 700px;
    background: #FF4F00;
    border-radius: 50%;
    opacity: 0.12;
    filter: blur(40px);
  }
  .top {
    z-index: 2;
  }
  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 40px;
    line-height: 0.95;
    letter-spacing: -0.04em;
  }
  .wordmark .anti { color: #F6F0EA; }
  .wordmark .noise { color: #FF4F00; }
  .wordmark .anti .lower { text-transform: none; }
  .quote {
    z-index: 2;
  }
  .mark {
    font-family: 'Instrument Serif', serif;
    font-size: 140px;
    color: #FF4F00;
    line-height: 0.6;
    margin-bottom: 30px;
  }
  .text {
    font-family: 'Instrument Serif', serif;
    font-size: 72px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-weight: 400;
  }
  .text .em { color: #FF4F00; font-style: italic; }
  .attr {
    margin-top: 50px;
    font-size: 22px;
    font-weight: 500;
    color: #F6F0EA;
    opacity: 0.5;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .bottom {
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .tag {
    font-size: 20px;
    color: #F6F0EA;
    opacity: 0.4;
  }
  .url {
    font-size: 22px;
    font-weight: 600;
    color: #FF4F00;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="wordmark">
        <div class="anti">ANT<span class="lower">i</span></div>
        <div class="noise">NOISE</div>
      </div>
    </div>
    <div class="quote">
      <div class="mark">"</div>
      <div class="text">
        Reading without<br>
        testing is just<br>
        <span class="em">hoarding.</span>
      </div>
      <div class="attr">— Building Anti Noise · Day 9</div>
    </div>
    <div class="bottom">
      <div class="tag">Solo indie · Building in public</div>
      <div class="url">antinoise.pages.dev</div>
    </div>
  </div>
</body>
</html>
