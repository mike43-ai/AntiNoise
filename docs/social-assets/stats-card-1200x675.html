<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anti Noise — Stats card 1200x675</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a2a2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .card {
    width: 1200px; height: 675px;
    background: #F4F1EE;
    color: #1D1B18;
    padding: 70px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand-row {
    display: flex;
    align-items: center;
  }
  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 0.95;
    letter-spacing: -0.04em;
  }
  .wordmark .anti { color: #1D1B18; }
  .wordmark .noise { color: #FF4F00; }
  .wordmark .anti .lower { text-transform: none; }
  .week-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #FF4F00;
    background: rgba(255, 79, 0, 0.1);
    padding: 8px 14px;
    border-radius: 100px;
  }
  .title-row {
    margin-top: 30px;
  }
  .title {
    font-family: 'Instrument Serif', serif;
    font-size: 56px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    font-weight: 400;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-top: 10px;
  }
  .stat {
    border-top: 2px solid #1D1B18;
    padding-top: 16px;
  }
  .stat-num {
    font-family: 'Instrument Serif', serif;
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.03em;
    font-weight: 400;
    color: #1D1B18;
  }
  .stat-num .accent { color: #FF4F00; }
  .stat-label {
    margin-top: 10px;
    font-size: 16px;
    font-weight: 500;
    color: #1D1B18;
    opacity: 0.7;
    line-height: 1.3;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .takeaway {
    font-size: 18px;
    font-weight: 500;
    color: #1D1B18;
    max-width: 70%;
    line-height: 1.4;
  }
  .takeaway .em { color: #FF4F00; font-weight: 600; }
  .url {
    font-size: 16px;
    font-weight: 600;
    color: #FF4F00;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="top">
        <div class="brand-row">
          <div class="wordmark">
            <div class="anti">ANT<span class="lower">i</span></div>
            <div class="noise">NOISE</div>
          </div>
        </div>
        <div class="week-tag">Week 1 · Building in public</div>
      </div>
      <div class="title-row">
        <div class="title">First 7 days of Anti Noise live.</div>
      </div>
    </div>
    <div class="grid">
      <div class="stat">
        <div class="stat-num">23</div>
        <div class="stat-label">Installs</div>
      </div>
      <div class="stat">
        <div class="stat-num">5</div>
        <div class="stat-label">Paid trials</div>
      </div>
      <div class="stat">
        <div class="stat-num">11</div>
        <div class="stat-label">Waitlist emails<br>for v1.0.1</div>
      </div>
      <div class="stat">
        <div class="stat-num"><span class="accent">78%</span></div>
        <div class="stat-label">BYOK drop-off<br>(expected)</div>
      </div>
    </div>
    <div class="bottom">
      <div class="takeaway">
        Soft launch was the right call. <span class="em">Saving the heat for v1.0.1</span> — when the API key requirement goes away.
      </div>
      <div class="url">antinoise.pages.dev</div>
    </div>
  </div>
</body>
</html>
