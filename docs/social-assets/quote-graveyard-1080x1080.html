<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anti Noise — Quote (Graveyard) 1080x1080</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --ink:#0a0a0a; --paper:#f4f1ea; --paper-2:#ebe7dd;
    --accent:#ff5e1a; --lime:#c6ff3a; --violet:#7b5cff;
    --muted:#5a5650;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a2a2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: 'Archivo', sans-serif; }
  .card {
    width: 1080px; height: 1080px;
    background: var(--ink);
    color: var(--paper);
    padding: 90px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    font-family: 'Archivo', sans-serif;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -180px; right: -180px;
    width: 440px; height: 440px;
    background: var(--accent);
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.4;
    z-index: 0;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -200px; left: -200px;
    width: 380px; height: 380px;
    background: var(--violet);
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
    z-index: 0;
  }
  .top {
    z-index: 2;
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .wordmark {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 0.92;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }
  .wordmark .anti { color: var(--paper); }
  .wordmark .noise { color: var(--accent); }
  .wordmark .anti .lower { text-transform: none; }
  .corner-sticker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: var(--accent);
    color: var(--paper);
    padding: 9px 14px;
    border: 2px solid var(--paper);
    border-radius: 10px;
    box-shadow: 4px 4px 0 var(--lime);
    transform: rotate(-6deg);
  }
  .quote {
    z-index: 2;
    position: relative;
  }
  .text {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 92px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }
  .text .hl {
    position: relative;
    display: inline-block;
    color: var(--paper);
  }
  .text .hl::after {
    content: "";
    position: absolute;
    left: -6px; right: -6px;
    bottom: 8%;
    height: 36%;
    background: var(--accent);
    z-index: -1;
    transform: rotate(-1.5deg);
  }
  .text .lime {
    color: var(--lime);
  }
  .attr {
    margin-top: 44px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--lime);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .bottom {
    z-index: 2;
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: rgba(244, 241, 234, 0.55);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    background: var(--lime);
    padding: 9px 16px;
    border: 2px solid var(--paper);
    border-radius: 999px;
    box-shadow: 3px 3px 0 var(--accent);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="wordmark">
        <div class="anti">ANT<span class="lower">i</span></div>
        <div class="noise">NOISE</div>
      </div>
      <div class="corner-sticker">RIP bookmarks</div>
    </div>
    <div class="quote">
      <div class="text">
        "Save for later"<br>
        = <span class="hl">forget forever.</span><br>
        <br>
        Your bookmarks<br>
        are a <span class="lime">graveyard.</span>
      </div>
      <div class="attr">— Building Anti Noise</div>
    </div>
    <div class="bottom">
      <div class="tag">Solo indie · Building in public</div>
      <div class="url">antinoise.pages.dev</div>
    </div>
  </div>
</body>
</html>
