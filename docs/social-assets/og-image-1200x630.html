<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anti Noise — OG image 1200x630</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a2a2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .card {
    width: 1200px; height: 630px;
    background: #F4F1EE;
    color: #1D1B18;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: #FF4F00;
    border-radius: 50%;
    opacity: 0.08;
  }
  .top {
    z-index: 2;
  }
  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 32px;
    line-height: 0.95;
    letter-spacing: -0.04em;
  }
  .wordmark .anti { color: #1D1B18; }
  .wordmark .noise { color: #FF4F00; }
  .wordmark .anti .lower { text-transform: none; }
  .hero {
    z-index: 2;
  }
  .hook {
    font-family: 'Instrument Serif', serif;
    font-size: 78px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    font-weight: 400;
    max-width: 1000px;
  }
  .hook .accent { color: #FF4F00; font-style: italic; }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 2;
  }
  .tag {
    font-size: 20px;
    font-weight: 500;
    color: #1D1B18;
    opacity: 0.7;
  }
  .url {
    font-size: 18px;
    font-weight: 600;
    color: #FF4F00;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="wordmark">
        <div class="anti">ANT<span class="lower">i</span></div>
        <div class="noise">NOISE</div>
      </div>
    </div>
    <div class="hero">
      <div class="hook">
        Turn the articles you save<br>
        into <span class="accent">knowledge you'll<br>actually remember.</span>
      </div>
    </div>
    <div class="bottom">
      <div class="tag">AI Feynman summaries + auto flashcards · iOS</div>
      <div class="url">antinoise.pages.dev</div>
    </div>
  </div>
</body>
</html>
