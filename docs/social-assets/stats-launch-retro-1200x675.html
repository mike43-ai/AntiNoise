<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anti Noise — Stats (Launch Retro) 1200x675</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --ink:#0a0a0a; --paper:#f4f1ea; --paper-2:#ebe7dd;
    --accent:#ff5e1a; --lime:#c6ff3a; --violet:#7b5cff;
    --muted:#5a5650;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a2a2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: 'Archivo', sans-serif; }
  .card {
    width: 1200px; height: 675px;
    background: var(--paper);
    color: var(--ink);
    padding: 52px 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    font-family: 'Archivo', sans-serif;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .wordmark {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 26px;
    line-height: 0.92;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }
  .wordmark .anti { color: var(--ink); }
  .wordmark .noise { color: var(--accent); }
  .wordmark .anti .lower { text-transform: none; }
  .week-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink);
    background: var(--violet);
    color: var(--paper);
    padding: 9px 16px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 50px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    margin-top: 14px;
  }
  .title .hl {
    position: relative;
    display: inline-block;
    color: var(--ink);
  }
  .title .hl::after {
    content: "";
    position: absolute;
    left: -4px; right: -4px;
    bottom: 8%;
    height: 36%;
    background: var(--accent);
    z-index: -1;
    transform: rotate(-1.5deg);
  }
  .funnel {
    display: flex;
    align-items: stretch;
    gap: 10px;
  }
  .step {
    flex: 1;
    background: var(--paper-2);
    padding: 18px 16px;
    border: 3px solid var(--ink);
    border-radius: 12px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .step:nth-child(1) { background: var(--paper-2); }
  .step:nth-child(3) { background: var(--lime); }
  .step:nth-child(5) { background: var(--paper-2); }
  .step:nth-child(7) { background: var(--violet); color: var(--paper); box-shadow: 4px 4px 0 var(--accent); }
  .step:nth-child(9) { background: var(--accent); color: var(--paper); box-shadow: 4px 4px 0 var(--ink); }
  .step-num {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--ink);
  }
  .step:nth-child(7) .step-num { color: var(--paper); }
  .step:nth-child(9) .step-num { color: var(--paper); }
  .step-label {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    line-height: 1.35;
  }
  .step:nth-child(7) .step-label { color: rgba(244, 241, 234, 0.85); }
  .step:nth-child(9) .step-label { color: rgba(244, 241, 234, 0.85); }
  .step-rate {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    margin-top: 6px;
  }
  .step:nth-child(7) .step-rate { color: var(--lime); }
  .step:nth-child(9) .step-rate { color: var(--lime); }
  .arrow {
    align-self: center;
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--ink);
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .takeaway {
    font-family: 'Archivo', sans-serif;
    font-size: 17px;
    font-weight: 600;
    max-width: 75%;
    line-height: 1.45;
    color: var(--ink);
  }
  .takeaway .em { color: var(--accent); font-weight: 800; text-transform: uppercase; }
  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    background: var(--accent);
    padding: 8px 14px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    box-shadow: 3px 3px 0 var(--ink);
  }
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="top">
        <div class="wordmark">
          <div class="anti">ANT<span class="lower">i</span></div>
          <div class="noise">NOISE</div>
        </div>
        <div class="week-tag">48-hour launch funnel</div>
      </div>
      <div class="title">PH + HN launch — <span class="hl">conversion funnel.</span></div>
    </div>
    <div class="funnel">
      <div class="step">
        <div class="step-num">580</div>
        <div class="step-label">Store visits</div>
        <div class="step-rate">100%</div>
      </div>
      <div class="arrow">→</div>
      <div class="step">
        <div class="step-num">142</div>
        <div class="step-label">Installs</div>
        <div class="step-rate">24%</div>
      </div>
      <div class="arrow">→</div>
      <div class="step">
        <div class="step-num">89</div>
        <div class="step-label">Signups</div>
        <div class="step-rate">63%</div>
      </div>
      <div class="arrow">→</div>
      <div class="step">
        <div class="step-num">67</div>
        <div class="step-label">First AI<br>summary</div>
        <div class="step-rate">75%</div>
      </div>
      <div class="arrow">→</div>
      <div class="step">
        <div class="step-num">40</div>
        <div class="step-label">Paid<br>trials</div>
        <div class="step-rate">60%</div>
      </div>
    </div>
    <div class="bottom">
      <div class="takeaway">
        Activation feels solid. <span class="em">v1.0.1 server proxy was worth the delay.</span><br>v1.0 BYOK would have killed this.
      </div>
      <div class="url">antinoise.pages.dev</div>
    </div>
  </div>
</body>
</html>
