<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-variant": "#e8e1dc",
                  "surface-container-lowest": "#ffffff",
                  "surface-tint": "#FF4F00",
                  "primary-container": "#FF4F00",
                  "surface": "#F4F1EE",
                  "on-surface-variant": "#5c4037",
                  "on-background": "#1d1b18",
                  "surface-container-high": "#eee7e1",
                  "on-error-container": "#93000a",
                  "secondary": "#5f5e5e",
                  "on-secondary-fixed-variant": "#474746",
                  "outline-variant": "#e6beb2",
                  "on-tertiary": "#ffffff",
                  "on-surface": "#1d1b18",
                  "on-error": "#ffffff",
                  "secondary-container": "#e2dfde",
                  "primary-fixed": "#ffdbd0",
                  "tertiary-container": "#757472",
                  "surface-container": "#f3ede7",
                  "on-secondary-fixed": "#1c1b1b",
                  "background": "#F4F1EE",
                  "secondary-fixed": "#e5e2e1",
                  "on-secondary": "#ffffff",
                  "tertiary-fixed": "#e5e2df",
                  "error-container": "#ffdad6",
                  "inverse-surface": "#33302c",
                  "tertiary-fixed-dim": "#c8c6c3",
                  "on-primary-fixed": "#3a0b00",
                  "surface-bright": "#fff8f2",
                  "on-secondary-container": "#636262",
                  "tertiary": "#5d5c5a",
                  "primary-fixed-dim": "#ffb59e",
                  "outline": "#916f65",
                  "on-tertiary-fixed-variant": "#474745",
                  "on-tertiary-container": "#f9ffeb",
                  "primary": "#FF4F00",
                  "secondary-fixed-dim": "#c8c6c5",
                  "on-primary-fixed-variant": "#842500",
                  "inverse-on-surface": "#f6f0ea",
                  "error": "#ba1a1a",
                  "on-primary-container": "#fffbff",
                  "on-primary": "#ffffff",
                  "surface-container-low": "#f9f2ed",
                  "surface-container-highest": "#e8e1dc",
                  "on-tertiary-fixed": "#1c1c1a",
                  "surface-dim": "#dfd9d3",
                  "inverse-primary": "#ffb59e"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "xl": "48px",
                  "unit": "4px",
                  "md": "16px",
                  "container-padding": "32px",
                  "sm": "8px",
                  "lg": "24px",
                  "xs": "4px",
                  "gutter": "16px"
          },
          "fontFamily": {
                  "body-md": ["Space Grotesk"],
                  "headline-md": ["Space Grotesk"],
                  "body-lg": ["Space Grotesk"],
                  "label-sm": ["Space Grotesk"],
                  "headline-lg": ["Space Grotesk"],
                  "display": ["Space Grotesk"]
          },
          "fontSize": {
                  "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                  "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "0em", "fontWeight": "600"}],
                  "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                  "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.08em", "fontWeight": "500"}],
                  "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #F4F1EE;
    }
    .glass-nav {
      background: rgba(244, 241, 238, 0.85);
      backdrop-filter: blur(12px);
    }
    .kinetic-card {
      background: #ffffff;
      border: 1px solid #E5E0DA;
      transition: all 0.2s ease;
    }
    .kinetic-card:hover {
      border-color: #FF4F00;
    }
  </style>
</head>
<body class="min-h-screen font-body-md text-stone-900 flex flex-col items-center selection:bg-[#FF4F00]/30">
<!-- TopAppBar -->
<header class="bg-[#F4F1EE] border-b border-[#E5E0DA] docked full-width top-0 flex justify-between items-center px-6 py-4 w-full sticky z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined cursor-pointer text-stone-900">menu</span>
<h1 class="text-xl font-bold tracking-tighter font-['Space_Grotesk'] text-stone-900 uppercase">ANTi NOISE</h1>
</div>
<div class="flex items-center gap-4">
<span class="text-stone-500 font-label-sm uppercase tracking-widest hidden sm:inline">Quick Capture</span>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border border-[#E5E0DA]">
<img alt="User profile avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVA-9NuVVTYQ9hFxZ29GQ8EwFIql_fe4-MHBw2MNf-1n8_8_qrNw9xRHXyPH1oS5Wq0AojSqncsK9dnQ6YVwHL-F6-vmap8N9xYz9UWqGFe9QfxrsVYOHIElFlTPLMYUzE5IsIv4kyAvWtbbxNyXddPCZt2zqYrc4g_MhWe2uRfOynk0TlznssmcwjFyPYuHg7xY5jHpj3tlmGxKiE1vsV9UhlIRZ2SkQJQTeF6W-wnT6b5Rd3ug0mCpuWoZOpzhrIjC56cSW2Rw"/>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-lg px-gutter py-lg flex flex-col gap-lg mb-32">
<!-- Step 1: Input Method -->
<section class="w-full flex flex-col gap-md">
<div class="flex items-center justify-between mb-2">
<h2 class="font-label-sm uppercase tracking-widest text-stone-500">1. Capture Content</h2>
</div>
<div class="flex flex-col gap-md">
<!-- Paste Link Card -->
<div class="kinetic-card p-lg rounded-xl flex flex-col gap-md">
<div class="flex items-center justify-between">
<div class="w-10 h-10 rounded-full bg-[#F4F1EE] flex items-center justify-center text-[#FF4F00]">
<span class="material-symbols-outlined">link</span>
</div>
<button class="flex items-center gap-2 py-2 px-4 bg-[#F4F1EE] hover:bg-[#FF4F00] hover:text-white rounded-lg transition-colors text-xs font-bold font-label-sm">
<span class="material-symbols-outlined text-sm">content_paste</span>
PASTE CLIPBOARD
</button>
</div>
<div class="flex flex-col gap-2">
<h3 class="font-bold text-sm uppercase tracking-tight text-stone-900">Paste Link</h3>
<input class="w-full bg-[#F4F1EE] border-none rounded-lg p-4 font-body-md text-sm focus:ring-2 focus:ring-[#FF4F00] placeholder:text-stone-400" placeholder="https://..." type="text"/>
</div>
<p class="text-[10px] text-stone-400 font-label-sm tracking-widest uppercase">Kinetic Link Parsing Enabled</p>
</div>
<!-- Upload Media Card -->
<div class="kinetic-card p-lg rounded-xl flex flex-col gap-md cursor-pointer">
<div class="w-10 h-10 rounded-full bg-[#F4F1EE] flex items-center justify-center text-[#FF4F00]">
<span class="material-symbols-outlined">upload_file</span>
</div>
<div class="flex flex-col gap-1">
<h3 class="font-bold text-sm uppercase tracking-tight text-stone-900">Upload Media</h3>
<p class="text-xs text-stone-500">Images, PDFs, or screenshots</p>
</div>
<div class="mt-2 border-2 border-dashed border-[#E5E0DA] hover:border-[#FF4F00] hover:bg-[#FF4F00]/5 rounded-lg py-10 flex flex-col items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-stone-400">add</span>
<span class="text-[10px] font-bold font-label-sm text-stone-400 uppercase tracking-widest">Browse Files</span>
</div>
</div>
</div>
</section>
<!-- Step 2: Intent Labeling -->
<section class="w-full flex flex-col gap-md">
<h2 class="font-label-sm uppercase tracking-widest text-stone-500">2. Define Intent</h2>
<div class="flex flex-col gap-md">
<button class="kinetic-card p-lg rounded-xl flex items-center gap-lg text-left w-full group">
<div class="w-12 h-12 rounded-full bg-[#F4F1EE] flex items-center justify-center text-[#FF4F00] group-hover:bg-[#FF4F00] group-hover:text-white transition-colors">
<span class="material-symbols-outlined">psychology</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-sm uppercase tracking-tight">Learn Skill</h3>
<p class="text-xs text-stone-500">Acquire new knowledge</p>
</div>
<span class="material-symbols-outlined text-stone-300">chevron_right</span>
</button>
<button class="kinetic-card p-lg rounded-xl flex items-center gap-lg text-left w-full group">
<div class="w-12 h-12 rounded-full bg-[#F4F1EE] flex items-center justify-center text-[#FF4F00] group-hover:bg-[#FF4F00] group-hover:text-white transition-colors">
<span class="material-symbols-outlined">terminal</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-sm uppercase tracking-tight">Improve Work</h3>
<p class="text-xs text-stone-500">Direct task application</p>
</div>
<span class="material-symbols-outlined text-stone-300">chevron_right</span>
</button>
<button class="bg-[#FF4F00] border border-[#FF4F00] p-lg rounded-xl flex items-center gap-lg text-left w-full shadow-lg shadow-[#FF4F00]/20">
<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center text-white">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-sm uppercase tracking-tight text-white">Develop Myself</h3>
<p class="text-xs text-white/80">Soft skills &amp; mindset</p>
</div>
<span class="material-symbols-outlined text-white">check_circle</span>
</button>
</div>
</section>
<!-- Step 3: Context & Save -->
<section class="w-full flex flex-col gap-md mt-4">
<button class="w-full bg-stone-900 text-white rounded-xl py-5 flex items-center justify-center gap-4 hover:bg-stone-800 transition-all active:scale-[0.98]">
<span class="font-label-sm uppercase tracking-[0.2em] font-bold">Process &amp; Save</span>
<div class="flex items-center gap-1.5 py-1 px-2 bg-white/10 rounded border border-white/20">
<span class="material-symbols-outlined text-[14px]">keyboard_command_key</span>
<span class="text-[10px] font-bold tracking-tight">ENTER</span>
</div>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-6 glass-nav border-t border-[#E5E0DA]">
<button class="text-stone-400 hover:text-stone-900 transition-colors">
<span class="material-symbols-outlined">target</span>
</button>
<button class="text-stone-400 hover:text-stone-900 transition-colors">
<span class="material-symbols-outlined">analytics</span>
</button>
<!-- Active FAB Quick Capture -->
<div class="relative -top-4">
<button class="w-16 h-16 bg-[#FF4F00] rounded-full flex items-center justify-center text-white shadow-xl shadow-[#FF4F00]/30 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
<div class="absolute -bottom-6 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-[#FF4F00] rounded-full"></div>
</div>
<button class="text-stone-400 hover:text-stone-900 transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="text-stone-400 hover:text-stone-900 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</nav>
</body></html>
